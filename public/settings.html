<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt Game - TikTok Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at top right, #1a1a2e, #0a0a0f);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        .container {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-family: 'Orbitron';
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 800px) {
            .grid { grid-template-columns: 1fr; }
        }

        .section h3 {
            font-family: 'Orbitron';
            color: var(--secondary);
            font-size: 0.9rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            box-sizing: border-box;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .flex-row {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            align-items: center;
        }

        .flex-row label { width: 140px; margin: 0; }
        .flex-row input { flex-grow: 1; }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.3);
        }

        .status {
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }

        .status.success { color: #00ff88; border-color: #00ff8844; }
        .status.error { color: #ff4444; border-color: #ff444444; }

        .save-btn {
            background: #222;
            border: 1px solid var(--primary);
            margin-top: 20px;
        }

        .save-btn:hover {
            background: var(--primary);
            color: #000;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #aaa;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            margin-bottom: 20px;
            transition: all 0.3s;
            padding: 8px 15px;
            border-radius: 8px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
        }

        .back-btn:hover {
            color: var(--primary);
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--primary);
            transform: translateX(-5px);
        }

        .back-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            VỀ TRANG CHỦ
        </a>
        <h1>TRUNG TÂM ĐIỀU KHIỂN</h1>
        
        <div class="grid">
            <div class="section">
                <h3>Cài đặt Kết nối</h3>
                <div class="input-group">
                    <label>ID TikTok (Ví dụ: thanh122k9)</label>
                    <input type="text" id="username" placeholder="Nhập ID TikTok của bạn">
                </div>
                <button id="connectBtn">KẾT NỐI TIKTOK</button>
                <div id="status" class="status">Sẵn sàng kết nối...</div>

                <div style="margin-top: 30px;">
                    <h3>Lệnh Điều khiển</h3>
                    <div class="flex-row">
                        <label>Tham gia</label>
                        <input type="text" id="cmd-join" value="!choi">
                    </div>
                    <div class="flex-row">
                        <label>Sang Trái</label>
                        <input type="text" id="cmd-left" value="a">
                    </div>
                    <div class="flex-row">
                        <label>Sang Phải</label>
                        <input type="text" id="cmd-right" value="d">
                    </div>
                    <div class="flex-row">
                        <label>Nhảy lên</label>
                        <input type="text" id="cmd-jump" value="w">
                    </div>
                    <div class="flex-row">
                        <label>Tấn công</label>
                        <input type="text" id="cmd-attack" value="f">
                    </div>
                    <div class="flex-row">
                        <label>Hòm thính (giây)</label>
                        <input type="number" id="drop-interval" value="30">
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>Sát thương Vũ khí</h3>
                <div class="flex-row">
                    <label>Đấm</label>
                    <input type="number" id="dmg-punch" value="1">
                </div>
                <div class="flex-row">
                    <label>Kiếm</label>
                    <input type="number" id="dmg-sword" value="2">
                </div>
                <div class="flex-row">
                    <label>Súng lục</label>
                    <input type="number" id="dmg-pistol" value="5">
                </div>
                <div class="flex-row">
                    <label>Súng trường</label>
                    <input type="number" id="dmg-rifle" value="10">
                </div>
                <div class="flex-row">
                    <label>Súng ngắm</label>
                    <input type="number" id="dmg-sniper" value="20">
                </div>
                <button id="saveAllBtn" class="save-btn">LƯU TẤT CẢ THIẾT LẬP</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const bc = new BroadcastChannel('game_sync');

        function loadSettings() {
            const saved = JSON.parse(localStorage.getItem('gameSettings')) || {
                username: '',
                commands: { join: '!choi', attack: 'f', left: 'a', right: 'd', jump: 'w' },
                damage: { punch: 1, sword: 2, pistol: 5, rifle: 10, sniper: 20 },
                dropInterval: 30
            };
            
            document.getElementById('username').value = saved.username || '';
            document.getElementById('cmd-join').value = saved.commands.join;
            document.getElementById('cmd-left').value = saved.commands.left || 'a';
            document.getElementById('cmd-right').value = saved.commands.right || 'd';
            document.getElementById('cmd-jump').value = saved.commands.jump || 'w';
            document.getElementById('cmd-attack').value = saved.commands.attack;
            document.getElementById('drop-interval').value = saved.dropInterval;
            
            document.getElementById('dmg-punch').value = saved.damage.punch;
            document.getElementById('dmg-sword').value = saved.damage.sword;
            document.getElementById('dmg-pistol').value = saved.damage.pistol;
            document.getElementById('dmg-rifle').value = saved.damage.rifle;
            document.getElementById('dmg-sniper').value = saved.damage.sniper;
        }

        function saveSettings() {
            const settings = {
                username: document.getElementById('username').value.trim(),
                commands: {
                    join: document.getElementById('cmd-join').value.toLowerCase().trim(),
                    left: document.getElementById('cmd-left').value.toLowerCase().trim(),
                    right: document.getElementById('cmd-right').value.toLowerCase().trim(),
                    jump: document.getElementById('cmd-jump').value.toLowerCase().trim(),
                    attack: document.getElementById('cmd-attack').value.toLowerCase().trim()
                },
                damage: {
                    punch: parseInt(document.getElementById('dmg-punch').value),
                    sword: parseInt(document.getElementById('dmg-sword').value),
                    pistol: parseInt(document.getElementById('dmg-pistol').value),
                    rifle: parseInt(document.getElementById('dmg-rifle').value),
                    sniper: parseInt(document.getElementById('dmg-sniper').value)
                },
                dropInterval: parseInt(document.getElementById('drop-interval').value)
            };
            localStorage.setItem('gameSettings', JSON.stringify(settings));
            bc.postMessage({ type: 'UPDATE_SETTINGS', settings });
            alert('Đã lưu thiết lập!');
        }

        let isConnecting = false;

        document.getElementById('connectBtn').addEventListener('click', () => {
            if (isConnecting) return;

            const user = document.getElementById('username').value.trim();
            if (user) {
                isConnecting = true;
                const btn = document.getElementById('connectBtn');
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.textContent = 'ĐANG KẾT NỐI...';
                
                document.getElementById('status').textContent = 'Đang gửi yêu cầu...';
                document.getElementById('status').className = 'status';
                
                socket.emit('setUniqueId', user);

                // Timeout
                setTimeout(() => {
                    if (isConnecting) {
                        isConnecting = false;
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        btn.textContent = 'KẾT NỐI TIKTOK';
                    }
                }, 10000);
            } else {
                alert('Vui lòng nhập ID TikTok!');
            }
        });

        document.getElementById('saveAllBtn').addEventListener('click', saveSettings);

        socket.on('connected', () => {
            isConnecting = false;
            const btn = document.getElementById('connectBtn');
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.textContent = 'KẾT NỐI TIKTOK';
            
            document.getElementById('status').textContent = '✅ Đã kết nối thành công!';
            document.getElementById('status').className = 'status success';
        });

        socket.on('log', (msg) => {
            document.getElementById('status').textContent = msg;
            if (msg.includes('❌')) {
                isConnecting = false;
                const btn = document.getElementById('connectBtn');
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.textContent = 'KẾT NỐI TIKTOK';
                document.getElementById('status').className = 'status error';
            }
        });

        loadSettings();
    </script>
</body>
</html>
