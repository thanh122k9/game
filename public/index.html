<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman TikTok Live Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0f 100%);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: transparent;
        }

        .ui-panel {
            display: none; /* Moved to modal */
        }

        .controls-info {
            display: none; /* Moved to modal */
        }

        #settings-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: rgba(0, 242, 255, 0.2);
            border: 2px solid #00f2ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100000;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            text-decoration: none;
        }

        #settings-toggle:hover {
            background: rgba(0, 242, 255, 0.4);
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
        }

        #settings-toggle svg {
            width: 35px;
            height: 35px;
            fill: #00f2ff;
            filter: drop-shadow(0 0 5px #00f2ff);
            pointer-events: none;
        }

        /* Modal Overlay */
        #settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        #settings-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            padding: 40px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #settings-modal.active .modal-content {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 2.5rem;
            cursor: pointer;
            color: #aaa;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-modal:hover {
            color: #fff;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .settings-grid { grid-template-columns: 1fr; }
        }

        .settings-section h3 {
            margin-top: 0;
            font-family: 'Orbitron';
            color: var(--secondary);
            font-size: 0.9rem;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        #leaderboard {
            position: fixed;
            top: 30px;
            left: 30px;
            width: 250px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            z-index: 100;
        }

        #leaderboard h3 {
            margin: 0 0 15px 0;
            font-family: 'Orbitron';
            color: var(--primary);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-align: center;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 5px;
        }

        #event-log {
            position: fixed;
            top: 110px; /* Under the gear icon */
            right: 30px;
            width: 320px;
            height: 250px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            overflow-y: auto;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column-reverse;
            z-index: 100;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.3s ease-out;
            border-left: 4px solid var(--primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="leaderboard">
            <h3>BẢNG XẾP HẠNG</h3>
            <div id="leaderboard-list">
                <!-- Danh sách người chơi sẽ hiện ở đây -->
            </div>
        </div>

        <div id="event-log">
            <!-- Sự kiện sẽ hiện ở đây -->
        </div>
    </div>

    <a id="settings-toggle" href="settings.html" target="_blank" title="Cài đặt hệ thống">

    </a>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
